; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = USB_MIDI         ; Production: MIDI only, no Serial
;default_envs = USB_MIDI_SERIAL ; Development: MIDI + Serial (enables DEBUG_* flags below)

[env]
platform = teensy
framework = arduino
board = teensy40
board_build.f_cpu = 600000000L ; Teensy 4.0 max clock: 600 MHz
monitor_port = /dev/ttyACM0
monitor_speed = 230400          ; Must match Serial.begin() in firmware
lib_deps =
	;bblanchon/ArduinoJson @ ^6.21.5
	bblanchon/ArduinoJson @ ^7.0.4
	;https://github.com/thomasfredericks/Bounce2

[env:USB_MIDI]
build_flags =
	-DUSB_MIDI           ; Teensy USB stack: MIDI only (no CDC Serial)
	-DBLOB_VELOCITY      ; Enable blob velocity & attack tracking (velocity_t in blob_t)
	-DTEENSY_OPT_FASTEST ; Compiler optimisation: -O3 (max speed, larger binary)
	;-DRUNING_MEDIAN     ; Use running-median filter on raw ADC values (heavier, smoother)

[env:USB_MIDI_SERIAL]
build_flags =
	-DUSB_MIDI_SERIAL   ; Teensy USB stack: MIDI + CDC Serial (required for DEBUG_* flags)
	-DBLOB_VELOCITY     ; Enable blob velocity & attack tracking (velocity_t in blob_t)
	-DTEENSY_OPT_FASTEST ; Compiler optimisation: -O3 (max speed, larger binary)
	;-DRUNING_MEDIAN    ; Use running-median filter on raw ADC values (heavier, smoother)

 	;-DDEBUG_FPS        ; Print Frames Per Second (last test is 586 fps)
 	;-DDEBUG_ENCODER    ; Print encoder value
 	;-DDEBUG_BUTTONS    ; Print buttons states
 	;-DDEBUG_MODES      ; Print mode transitions
 	;-DDEBUG_LEVELS     ; Print encoder level values
 	;-DDEBUG_ADC        ; Print 16x16 Analog raw values
 	;-DDEBUG_INTERP     ; Print 64x64 interpolated values
 	;-DDEBUG_BITMAP     ; Print 64x64 binary image based on threshold
	;-DDEBUG_LLIST      ; Print linked-list operations
 	;-DDEBUG_FIND_BLOBS ; Print low-level blob detection values
	;-DDEBUG_BLOBS_STATUS ; Print blob status transitions (NEW/PRESENT/MISSING/RELEASED)
 	;-DDEBUG_BLOBS      ; Print blob values: UID, X, Y, Z, W, H, Vxy, Vz
 	;-DDEBUG_MIDI_IO    ; Print outgoing MIDI messages
 	;-DDEBUG_CONFIG     ; Print SysEx config parsing

	;-DDEBUG_MAPPINGS_SWITCHS   ; Print switchs GUI values
	;-DDEBUG_MAPPINGS_SLIDERS 	; Print slider GUI values
	;-DDEBUG_MAPPINGS_KNOBS 	; Print knobs GUI values
	;-DDEBUG_MAPPINGS_TOUCHPADS ; Print touchpads GUI values
	;-DDEBUG_MAPPINGS_POLYGONS	; Print polygons GUI values
	
